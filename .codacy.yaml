---
# Codacy Cloud repository configuration.
# Keep generated/local artifacts out of cloud analysis while preserving source,
# guard scripts, and active runtime/modeling code.
exclude_paths:
  - ".codacy/**"
  - ".next/**"
  - "node_modules/**"
  - "coverage/**"
  - ".venv/**"
  - "venv/**"
  - ".claude-state/**"
  - ".tradingview-mcp/**"
  - ".playwright-mcp/**"
  - ".remember/**"
  - "data/**"
  - "artifacts/**"
  - "models/**"
  - "Powerdrill/**"
  - "docs/backtest-reports/PowerDrill Research/**"
  - "scripts/LuxAlgo/**"
  - "scripts/duckdb_local/archive/**"
  - "scripts/duckdb_local/workspaces/archive/**"
  - "scripts/duckdb_local/workspaces/**/exports/**"
  - "scripts/duckdb_local/workspaces/**/reports/**"
  - "scripts/duckdb_local/workspaces/**/experiments/**"
  - "**/*.png"
  - "**/*.docx"

engines:
  duplication:
    exclude_paths:
      - "agents/**"
      - ".github/skills/**"
      - "docs/**"
      - "tests/**"
      - "supabase/migrations/**"
      - "local_warehouse/migrations/**"
  metric:
    exclude_paths:
      - "agents/**"
      - ".github/**"
      - "docs/**"
      - "tests/**"
      - "supabase/migrations/**"
      - "local_warehouse/migrations/**"
      - "scripts/ag/strategy_tuning_space*.json"
      - "scripts/duckdb_local/indicator_registry.json"
  eslint-9:
    exclude_paths:
      - ".github/**"
      - "agents/**"
  pmd-7:
    exclude_paths:
      - ".github/**"
      - "agents/**"
      - "docs/**"
  pylintpython3:
    exclude_paths:
      - "local_warehouse/**"
      - "scripts/ag/local_warehouse_schema.sql"
  opengrep:
    exclude_paths:
      - ".github/skills/**"
      - "agents/skills/**"
  trivy:
    exclude_paths:
      - ".github/**"
