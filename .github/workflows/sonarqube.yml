name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  scan:
    name: SonarQube Cloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Lint frontend/runtime code
        run: npm run lint

      - name: Build frontend/runtime code
        run: npm run build

      - name: Install repository guard dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Run repository guard checks
        run: |
          ./scripts/guards/check-contamination.sh
          ./scripts/guards/check-no-tv-force.sh
          ./scripts/guards/check-canonical-zoo.sh
          ./scripts/guards/check-fib-scanner-guardrails.sh

      - name: Run Pine static lint
        run: |
          ./scripts/guards/pine-lint.sh indicators/warbird-pro-v9.pine
          ./scripts/guards/pine-lint.sh indicators/warbird-nexus-machine-learning-rsi-optuna-fast-test.pine

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python test dependencies
        run: |
            python -m pip install \
              setuptools==80.10.2 \
              numpy==2.3.5 \
              pandas==2.3.3 \
              pytest==9.0.3 \
              pytest-cov==7.1.0 \
              pytest-asyncio==1.4.0 \
              websockets==16.0 \
              duckdb==1.5.2 \
              pandera==0.31.1 \
              fg-data-profiling==4.19.1 \
              fastapi==0.136.3 \
              httpx==0.28.1 \
              httpx-ws==0.9.0

      - name: Run Python contract tests with coverage
        run: |
          mkdir -p sonar-reports
          python -m pytest \
            tests/ag/test_v9_core_indicator_input_contract.py \
            tests/ag/test_v9_core_training_targets.py \
            tests/duckdb_local/test_warbird_pro_v9_contract.py \
            tests/engine/ \
            --cov=scripts \
            --cov=engine \
            --cov-report=xml:sonar-reports/coverage.xml \
            --junitxml=sonar-reports/pytest-contracts.xml
          python -m pytest \
            scripts/ag/test_tuner.py \
            -k "load_trials_jsonl_csv_full_includes_tv_mcp_strict or load_history_jsonl_filters_by_profile" \
            --junitxml=sonar-reports/pytest-tuner.xml

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
