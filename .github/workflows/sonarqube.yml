name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  scan:
    name: SonarQube Cloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Lint frontend/runtime code
        run: npm run lint

      - name: Build frontend/runtime code
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas pytest pytest-cov

      - name: Generate Python coverage
        run: |
          python -m pytest tests/ag/test_v9_core_training_targets.py \
            --cov=scripts \
            --cov-report=xml:coverage.xml

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
