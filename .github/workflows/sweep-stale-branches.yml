name: Sweep stale auto-created branches

# Server-side enforcement of CLAUDE.md "no feature branches" rule.
# Deletes any branch matching claude/*, copilot/*, or feature/* that is
# fully merged into main (no unique commits). Safe — never touches a
# branch with unmerged work, never touches main.
#
# Triggers:
# - push to main      → cleanup runs after every commit lands on main
# - workflow_dispatch → manual one-shot from the Actions tab
# - schedule (daily)  → catches anything the push trigger missed

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

permissions:
  contents: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged auto-created branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail

          deleted=0
          skipped=0

          # List every branch matching the auto-created patterns.
          mapfile -t branches < <(
            gh api --paginate "/repos/$REPO/branches" --jq '.[] | .name' \
              | grep -E '^(claude|copilot|feature)/' || true
          )

          if [ "${#branches[@]}" -eq 0 ]; then
            echo "No claude/*, copilot/*, or feature/* branches found. Nothing to sweep."
            exit 0
          fi

          for branch in "${branches[@]}"; do
            # Use compare API: ahead_by counts commits the branch has that
            # main lacks. Zero means the branch is fully merged into main.
            ahead=$(gh api "/repos/$REPO/compare/main...$branch" --jq '.ahead_by' 2>/dev/null || echo "")

            if [ -z "$ahead" ]; then
              echo "Skipping $branch — compare API failed."
              skipped=$((skipped + 1))
              continue
            fi

            if [ "$ahead" = "0" ]; then
              echo "Deleting $branch (fully merged into main)..."
              if gh api -X DELETE "/repos/$REPO/git/refs/heads/$branch" 2>&1; then
                deleted=$((deleted + 1))
                echo "  ✓ deleted $branch"
              else
                echo "  ✗ delete failed for $branch"
                skipped=$((skipped + 1))
              fi
            else
              echo "Skipping $branch — has $ahead unique commit(s) not in main."
              skipped=$((skipped + 1))
            fi
          done

          echo ""
          echo "Sweep complete: deleted=$deleted, skipped=$skipped"
