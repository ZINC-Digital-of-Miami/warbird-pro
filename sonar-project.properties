# SonarCloud project configuration for Warbird Pro
# Quality Gate: "Warbird Pro" (custom — relaxed coverage for realistic thresholds)
# Quality Profiles: "Warbird Pro" for Python, TypeScript, JavaScript (extended security rules)

sonar.projectKey=ZINC-Digital-of-Miami_warbird-pro
sonar.organization=zinc-digital-of-miami

sonar.projectName=Warbird Pro
sonar.projectVersion=9.0

# SonarQube Cloud is the primary hosted quality gate. The GitHub Actions
# workflow runs npm install/lint/build, repo guards, Pine static lint, and
# Python contract tests before this scan; the scanner waits for the Sonar
# Quality Gate and fails the workflow on a red gate.
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Source directories
sonar.sources=.

# ── Exclusions ─────────────────────────────────────────────────────────
# Build artifacts, caches, data, and non-source directories
sonar.exclusions=\
  .next/**,\
  node_modules/**,\
  coverage/**,\
  .venv/**,\
  venv/**,\
  .claude-state/**,\
  .tradingview-mcp/**,\
  .playwright-mcp/**,\
  .remember/**,\
  data/**,\
  artifacts/**,\
  models/**,\
  Powerdrill/**,\
  docs/backtest-reports/**,\
  scripts/LuxAlgo/**,\
  scripts/duckdb_local/archive/**,\
  scripts/duckdb_local/workspaces/archive/**,\
  scripts/duckdb_local/workspaces/**/exports/**,\
  scripts/duckdb_local/workspaces/**/reports/**,\
  scripts/duckdb_local/workspaces/**/experiments/**,\
  **/*.png,\
  **/*.docx

# Duplication exclusions — config/docs/tests/migrations
sonar.cpd.exclusions=\
  agents/**,\
  .github/skills/**,\
  docs/**,\
  tests/**,\
  supabase/migrations/**,\
  local_warehouse/migrations/**

# Coverage exclusions — dashboard has no JS test runner, tests are the tests
sonar.coverage.exclusions=\
  dashboard/**,\
  tests/**

# ── Language Settings ──────────────────────────────────────────────────

# Python
sonar.python.version=3.11
sonar.python.coverage.reportPaths=sonar-reports/coverage.xml

# TypeScript / JavaScript
# No JS/TS test runner currently emits lcov. Do not point Sonar at a missing
# coverage/lcov.info file; keep npm lint/build as executable gates in the
# Sonar workflow until a real JS/TS coverage producer exists.

# File suffixes to analyze
sonar.python.file.suffixes=py
sonar.javascript.file.suffixes=js,jsx
sonar.typescript.file.suffixes=ts,tsx

# ── Encoding ───────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
