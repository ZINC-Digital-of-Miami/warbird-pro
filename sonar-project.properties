# SonarQube / SonarCloud project configuration for Warbird Pro
sonar.projectKey=ZINC-Digital-of-Miami_warbird-pro
sonar.organization=zinc-digital-of-miami

sonar.projectName=Warbird Pro
sonar.projectVersion=9.0

# Source directories
sonar.sources=.

# Exclusions — same patterns as the old .codacy.yaml, adapted for Sonar
sonar.exclusions=\
  .next/**,\
  node_modules/**,\
  coverage/**,\
  .venv/**,\
  venv/**,\
  .claude-state/**,\
  .tradingview-mcp/**,\
  .playwright-mcp/**,\
  .remember/**,\
  data/**,\
  artifacts/**,\
  models/**,\
  Powerdrill/**,\
  docs/backtest-reports/**,\
  scripts/LuxAlgo/**,\
  scripts/duckdb_local/archive/**,\
  scripts/duckdb_local/workspaces/archive/**,\
  scripts/duckdb_local/workspaces/**/exports/**,\
  scripts/duckdb_local/workspaces/**/reports/**,\
  scripts/duckdb_local/workspaces/**/experiments/**,\
  **/*.png,\
  **/*.docx

# Duplication exclusions
sonar.cpd.exclusions=\
  agents/**,\
  .github/skills/**,\
  docs/**,\
  tests/**,\
  supabase/migrations/**,\
  local_warehouse/migrations/**

# Language-specific settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.python.version=3.11
